name: Auto Update CTET Data Pipeline

on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

jobs:
  build-and-scrape:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout Repository Source Codes
      uses: actions/checkout@v4

    - name: Initialize Automated Python Runtime Environment
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Install System Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install requests beautifulsoup4 pypdf

    - name: Execute Background Scraper Engine
      run: python scripts/scraper.py
